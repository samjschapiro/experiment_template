<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Study</title>

    <!-- jsPsych 7.x via CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .jspsych-content { max-width: 900px; font-size: 16px; }
        .jspsych-btn {
            font-size: 16px; padding: 12px 24px; margin: 10px;
            background-color: #007bff; color: white;
            border: none; border-radius: 5px; cursor: pointer;
        }
        .jspsych-btn:hover { background-color: #0056b3; }
        #debug-banner {
            background: #fef3c7; color: #92400e;
            padding: 8px 12px; font-size: 14px;
            border-bottom: 1px solid #fcd34d;
        }
    </style>
</head>
<body>
    <div id="debug-banner" style="display:none">DEBUG MODE — no PROLIFIC_PID detected; submissions disabled.</div>

    <!-- Stimuli bundle: generated by prepare_stimuli.py at build time.
         Exposes window.STIMULI_DATA = [{id, condition, ...}]. -->
    <script src="js/stimuli-data.js"></script>

    <script src="js/experiment.js"></script>
</body>
</html>
